syntax = "proto3";

package order;

option cc_generic_services = true;

message MakeOrderRequest {
    int32 user_id = 1;
    int32 product_id = 2;
}

message MakeOrderResponse {
    bool success = 1;
    string order_id = 2;
    string errmsg = 3;
}

service OrderServiceRpc {
    rpc MakeOrder(MakeOrderRequest) returns (MakeOrderResponse);
}
